<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scroll Animation Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 3rem;
}

.hero {
  background: #111;
  color: white;
}

.scroll-section {
  height: 100vh;
  background: #f4f4f4;
  position: relative;
}

.content {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.text {
  width: 40%;
  opacity: 0;
  transform: translateY(100px);
}

.image {
  width: 400px;
  height: 400px;
  background: url("https://picsum.photos/600/600") center/cover;
  border-radius: 20px;
  transform: scale(0.5);
}

.end {
  background: #222;
  color: white;
}
</style>
</head>
<body>

<div class="section hero">
  Haz scroll 👇
</div>

<div class="scroll-section">
  <div class="content">
    <div class="text">
      Animación controlada por scroll
    </div>
    <div class="image"></div>
  </div>
</div>

<div class="section end">
  Fin de la animación
</div>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".scroll-section",
    start: "top top",
    end: "bottom top",
    scrub: true,
    pin: true
  }
});

tl.to(".text", {
  opacity: 1,
  y: 0
})
.to(".image", {
  scale: 1,
  rotate: 360
}, 0);
</script>

</body>
</html>
