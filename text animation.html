<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GSAP Scroll Reveal</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            font-family: Arial, sans-serif;
            color: white;
        }

        .spacer {
            height: 100vh;
        }

        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* IMPORTANTE */
        }



        h1 {
            font-size: clamp(1.5rem, 6vw, 4rem);
            text-align: center;
            line-height: 1.3;
            max-width: 900px;
            margin: 0 auto;
            position: absolute;
        }

        .frase1 {
            color: grey;
            z-index: 1;
        }

        .frase2 span {
            background-image: linear-gradient(90deg,
                    #ffffff,
                    #5ac1f6 10%,
                    #a5afed 38%,
                    #f19de4 55%,
                    #eb3e3c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .frase2 {
            z-index: 2;
        }

        .frase3 {
            color: white;
            z-index: 3;
            /* ESTA ESTÁ MÁS ENCIMA */
        }
    </style>
</head>

<body>

    <div class="spacer"></div>

    <section class="section">
        <h1 class="frase1 z-1">
            <span>La vida es una cosa</span>
            <span>que hay que vivirla pa saber</span><br>
            <span>pero pa tu saber vivirla</span>
            <span>tienes que vivir</span>
        </h1>
        <h1 class="frase2 z-2">
            <span style="opacity: 0;">La vida es una cosa</span>
            <span style="opacity: 0;">que hay que vivirla pa saber</span><br>
            <span style="opacity: 0;">pero pa tu saber vivirla</span>
            <span style="opacity: 0;">tienes que vivir</span>
        </h1>
        <h1 class="frase3 z-3">
            <span style="opacity: 0;">La vida es una cosa</span>
            <span style="opacity: 0;">que hay que vivirla pa saber</span><br>
            <span style="opacity: 0;">pero pa tu saber vivirla</span>
            <span style="opacity: 0;">tienes que vivir</span>
        </h1>
    </section>

    <div class="spacer"></div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const spans2 = document.querySelectorAll(".frase2 span");
        const spans3 = document.querySelectorAll(".frase3 span");

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".section",
                start: "top top",
                end: "+=600",
                scrub: true,
                pin: true,
                markers: true
            }
        });

        // Animación intercalada
        spans2.forEach((span, i) => {
            tl.to(span, {
                opacity: 1,
                ease: "power1.out",
                duration: 0.2
            });

            tl.to(spans3[i], {
                opacity: 1,
                ease: "power1.out",
                duration: 0.3
            });
        });
    </script>

</body>

</html>
